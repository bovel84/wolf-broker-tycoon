name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ES5 lint
        run: npm run lint

      - name: Build single-file HTML
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      - name: Upload built HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolf-broker-tycoon
          path: wolf-broker-tycoon.html
